<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyntaxLab ⚡ | AI Tutor</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Prism.js for code syntax highlighting -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

  
  <!-- External CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">

</head>

<body class="flex justify-end items-center min-h-screen bg-gray-900">
  <!-- Chat Panel -->
  <div class="chat-container w-1/2 h-[85vh] flex flex-col rounded-xl overflow-hidden border border-gray-700 relative mr-10">

    <!-- Header -->
    <div class="p-5 border-b border-gray-700">
      <nav class="max-w-7xl mx-auto flex justify-center items-center">
        <a href="courses.html" class="text-3xl font-extrabold logo-gradient tracking-tight">
          SyntaxLab ⚡
        </a>
      </nav>
    </div>

    <!-- Messages -->
    <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4">
      <div class="bg-gray-800 p-3 rounded-lg border border-gray-700 text-gray-300">
        👋 Hello! I'm your SyntaxLab AI Tutor. Ask me to explain code, fix errors, or teach you programming concepts.
      </div>
    </div>

    <!-- Input -->
    <div class="p-4 border-t border-gray-700 flex space-x-3">
      <input
        id="userInput"
        type="text"
        placeholder="Type your question..."
        class="flex-1 p-3 bg-gray-900 border border-gray-700 rounded-lg text-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-400"
      />
      <button id="sendBtn" class="px-6 py-3 rounded-lg btn-gradient">
        Send
      </button>
    </div>
  </div>

  
  <!-- Common JS -->
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
<script src="../js/chatbot.js"></script>
</body>
</html>
