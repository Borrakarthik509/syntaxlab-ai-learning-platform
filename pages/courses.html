<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SyntaxLab ⚡ | Course Modules</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">

</head>
<body class="antialiased">

<!-- Navbar -->
<header class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-sm border-b border-[var(--color-border)]">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
    <a href="afterloginhome.html" class="text-3xl font-extrabold logo-gradient tracking-tight">SyntaxLab ⚡</a>
    <div class="hidden lg:flex space-x-6 text-gray-400 font-medium">
      <a href="afterloginhome.html" class="hover:text-white">Home</a>
      <a href="courses.html" class="hover:text-white">Courses</a>
      <a href="userdashboard.html" class="hover:text-white">Profile</a>
      <a href="AIzonehome.html" class="hover:text-white">AI Zone</a>
      <a href="learnwithfun.html" class="hover:text-white">Learn With Fun</a>
      <a href="aboutus.html" class="hover:text-white">About</a>
    </div>
    <a href="#" id="logoutBtn" class="px-6 py-2 rounded-full font-semibold text-white btn-gradient">Logout</a>
  </nav>
</header>

<!-- Main -->
<main class="py-12 min-h-screen">
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="text-4xl font-extrabold text-center mb-12 flex items-center justify-center gap-2">
      <i data-lucide="book-open"></i> Explore Courses
    </h2>

    <div id="courseList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <div id="syllabusView" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6 mt-12">
      <div class="col-span-1 bg-gray-800 rounded-lg p-4 h-fit">
        <button id="backToCourses" class="px-4 py-2 mb-4 bg-gray-700 rounded-lg w-full hover:bg-gray-600 transition flex items-center justify-center gap-2">
          <i data-lucide="arrow-left"></i> Back to Courses
        </button>
        <h3 id="courseTitle" class="text-xl font-bold mb-3"></h3>
        <div id="moduleList" class="space-y-2"></div>
      </div>
      <div class="col-span-3 bg-gray-800 rounded-lg p-6" id="moduleDetails">
        <p class="text-gray-400">Select a module to view details</p>
      </div>
    </div>
  </section>
</main>

<!-- Firebase + Firestore -->

  <!-- Common JS -->
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script type="module" src="../js/courses.js"></script>

<!-- Chatbot Button -->
<button id="chatbotBtn"
  class="fixed bottom-6 right-6 bg-cyan-500 hover:bg-cyan-600 text-white rounded-full shadow-lg w-14 h-14 flex items-center justify-center transition"
  title="Chat with AI">
  <i data-lucide="message-circle"></i>
</button>
<script>
  document.getElementById("chatbotBtn").addEventListener("click", () => {
    window.location.href = "chatbot.html";
  });
  // initial icon render for static items
  lucide.createIcons();
</script>
</body>
</html>
